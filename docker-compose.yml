version: '3.8'

services:
  db:
    image: postgres:16
    container_name: exchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exchange_user
      POSTGRES_PASSWORD: exchange_pass
      POSTGRES_DB: exchange_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/engine/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_user -d exchange_sim"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    container_name: exchange_engine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://exchange_user:exchange_pass@db:5432/exchange_sim
    ports:
      - "8000:8000"

  web:
    image: node:20-slim
    container_name: exchange_web
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - engine

volumes:
  pgdata:
    driver: local